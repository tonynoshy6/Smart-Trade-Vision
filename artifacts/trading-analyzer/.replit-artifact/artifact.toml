kind = "web"
previewPath = "/"
title = "محلل التداول الذكي"
version = "1.0.0"
id = "artifacts/trading-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19953

[services.development]
run = "pnpm --filter @workspace/trading-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trading-analyzer", "run", "build" ]
publicDir = "artifacts/trading-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19953"
BASE_PATH = "/"
