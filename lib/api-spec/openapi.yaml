openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: Chart analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /analysis/analyze:
    post:
      operationId: analyzeChart
      tags: [analysis]
      summary: Analyze trading chart image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeChartRequest"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/history:
    get:
      operationId: getAnalysisHistory
      tags: [analysis]
      summary: Get analysis history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Analysis history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnalysisHistoryItem"

  /analysis/history/{id}:
    get:
      operationId: getAnalysisById
      tags: [analysis]
      summary: Get analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteAnalysis
      tags: [analysis]
      summary: Delete analysis by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /analysis/stats:
    get:
      operationId: getAnalysisStats
      tags: [analysis]
      summary: Get analysis statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    AnalyzeChartRequest:
      type: object
      properties:
        imageBase64:
          type: string
        market:
          type: string
          enum: [forex, gold, crypto]
        timeframe:
          type: string
          enum: [M5, M15, H1, H4, D1]
        symbol:
          type: string
        analysisSchool:
          type: string
          enum: [smc, ict, sk, mersal, combined]
          description: "مدرسة التحليل — combined لتحليل المدارس الأربع معاً"
      required:
        - imageBase64
        - market
        - timeframe
        - analysisSchool

    SchoolReasons:
      type: object
      description: أسباب الدخول من منظور كل مدرسة (موجود فقط عند التحليل المجمع)
      properties:
        smc:
          type: string
          description: سبب الدخول من منظور SMC
        ict:
          type: string
          description: سبب الدخول من منظور ICT
        sk:
          type: string
          description: سبب الدخول من منظور التحليل الكلاسيكي SK
        mersal:
          type: string
          description: سبب الدخول من منظور منهجية مرسال
        consensus:
          type: string
          description: ملخص الإجماع بين المدارس الأربع
      required:
        - smc
        - ict
        - sk
        - consensus

    InstitutionalSignal:
      type: object
      description: إشارة مؤسسية (بنوك وصناديق كبيرة)
      properties:
        name:
          type: string
          description: اسم الإشارة بالعربية
        type:
          type: string
          enum: [accumulation, distribution, absorption, manipulation, sweep]
        price:
          type: number
        priceHigh:
          type: number
        priceLow:
          type: number
        confidence:
          type: number
          description: نسبة الثقة في الإشارة 0-100
        description:
          type: string
      required:
        - name
        - type
        - description

    AnalysisResult:
      type: object
      properties:
        id:
          type: integer
        analysisSchool:
          type: string
          enum: [smc, ict, sk, mersal, combined]
        tradeType:
          type: string
          enum: [buy, sell]
        session:
          type: string
          enum: [asian, london, new_york, london_new_york, any]
          description: جلسة التداول المناسبة لهذه الصفقة
        probabilityWarning:
          type: string
          description: تحذير في حالة كانت النسبة أقل من 70% (فارغ إذا كانت النسبة عالية)
        entryPoint:
          type: number
        entryZoneHigh:
          type: number
        entryZoneLow:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        takeProfit2:
          type: number
        takeProfit3:
          type: number
        successProbability:
          type: number
        riskRewardRatio:
          type: number
        detailedAnalysis:
          type: string
        trendAnalysis:
          type: string
        schoolReasons:
          $ref: "#/components/schemas/SchoolReasons"
        institutionalSignals:
          type: array
          items:
            $ref: "#/components/schemas/InstitutionalSignal"
          description: إشارات دخول المؤسسات والبنوك الكبيرة
        liquidityZones:
          type: array
          items:
            $ref: "#/components/schemas/PriceZone"
        orderBlocks:
          type: array
          items:
            $ref: "#/components/schemas/PriceZone"
        fairValueGaps:
          type: array
          items:
            $ref: "#/components/schemas/PriceZone"
        structureBreaks:
          type: array
          items:
            $ref: "#/components/schemas/StructureEvent"
        characterChanges:
          type: array
          items:
            $ref: "#/components/schemas/StructureEvent"
        classicalPatterns:
          type: array
          items:
            $ref: "#/components/schemas/ClassicalPattern"
        supportResistanceLevels:
          type: array
          items:
            $ref: "#/components/schemas/SupportResistanceLevel"
        market:
          type: string
        timeframe:
          type: string
        symbol:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - tradeType
        - analysisSchool
        - entryPoint
        - stopLoss
        - takeProfit
        - successProbability
        - riskRewardRatio
        - detailedAnalysis
        - session
        - institutionalSignals
        - liquidityZones
        - orderBlocks
        - fairValueGaps
        - structureBreaks
        - characterChanges
        - classicalPatterns
        - supportResistanceLevels
        - market
        - timeframe

    PriceZone:
      type: object
      properties:
        label:
          type: string
        priceHigh:
          type: number
        priceLow:
          type: number
        type:
          type: string
          enum: [bullish, bearish, neutral]
        description:
          type: string
      required:
        - label
        - priceHigh
        - priceLow
        - type

    StructureEvent:
      type: object
      properties:
        label:
          type: string
        price:
          type: number
        type:
          type: string
          enum: [bullish, bearish]
        description:
          type: string
      required:
        - label
        - price
        - type

    ClassicalPattern:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [bullish, bearish, neutral]
        priceHigh:
          type: number
        priceLow:
          type: number
        description:
          type: string
        reliability:
          type: number
      required:
        - name
        - type
        - description

    SupportResistanceLevel:
      type: object
      properties:
        label:
          type: string
        price:
          type: number
        type:
          type: string
          enum: [support, resistance, strong_support, strong_resistance]
        description:
          type: string
      required:
        - label
        - price
        - type

    AnalysisHistoryItem:
      type: object
      properties:
        id:
          type: integer
        tradeType:
          type: string
          enum: [buy, sell]
        analysisSchool:
          type: string
          enum: [smc, ict, sk, mersal, combined]
        market:
          type: string
        timeframe:
          type: string
        symbol:
          type: string
        successProbability:
          type: number
        entryPoint:
          type: number
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tradeType
        - analysisSchool
        - market
        - timeframe
        - successProbability
        - entryPoint
        - createdAt

    AnalysisStats:
      type: object
      properties:
        totalAnalyses:
          type: integer
        buySignals:
          type: integer
        sellSignals:
          type: integer
        avgSuccessProbability:
          type: number
        avgBuyProbability:
          type: number
        avgSellProbability:
          type: number
        marketBreakdown:
          type: object
          additionalProperties:
            type: integer
        timeframeBreakdown:
          type: object
          additionalProperties:
            type: integer
      required:
        - totalAnalyses
        - buySignals
        - sellSignals
        - avgSuccessProbability
        - avgBuyProbability
        - avgSellProbability
        - marketBreakdown
        - timeframeBreakdown
